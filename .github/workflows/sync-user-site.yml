name: Sync to marksivan.github.io

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Push source to marksivan.github.io
        uses: cpina/github-action-push-to-another-repository@v1.7.2
        env:
          API_TOKEN_GITHUB: ${{ secrets.USER_SITE_SYNC_TOKEN }}
        with:
          source-directory: .
          destination-github-username: marksivan
          destination-repository-name: marksivan.github.io
          user-email: marktamakloe21@gmail.com
          user-name: Mark Tamakloe
          target-branch: main
